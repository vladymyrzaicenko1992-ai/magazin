<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Все в морозилке - Полное меню</title>
  <meta name="description" content="Полное красивое меню без цен с сохранением закладок.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="kicker">ВСЕ В МОРОЗИЛКЕ</p>
        <h1>Список товаров с фото</h1>
      </div>
    </header>

    <main>
      <section class="hero">
        <p>Только список: фото и название. Без цен и лишних блоков.</p>
      </section>

      <section>
        <div class="section-head" id="menu">
          <h2>Меню</h2>
          <input id="searchInput" type="search" placeholder="Поиск товара...">
        </div>
        <div id="categoryFilter" class="category-row"></div>
        <div id="productsGrid" class="products-grid"></div>
      </section>
    </main>
  </div>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
