<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ — Договор</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body data-doc-type="contract">
<div class="wrap">
  <p class="nav-back"><a href="../index.html" class="btn alt">← Все документы</a></p>
  <div class="header">
    <div class="logo">Договор на услуги</div>
    <div class="logo-sub">Номер, ФИО, дата и сумма ущерба — только для договора.</div>
  </div>

  <div class="card">
    <h3>Данные договора</h3>
    <div class="grid">
      <div><label for="docNo">Номер договора *</label><input id="docNo" type="text"></div>
      <div><label for="reportDate">Дата договора *</label><input id="reportDate" type="date"></div>
      <div class="span-2"><label for="fio">ФИО заказчика *</label><input id="fio" type="text"></div>
      <div><label for="blockedKzt">Сумма ущерба (₸) *</label><input id="blockedKzt" type="number" step="0.01"></div>
    </div>
    <button class="btn alt" id="previewBtn" type="button">Предпросмотр</button>
    <div class="preview" id="preview" style="margin-top:14px"></div>
  </div>

  <div class="card">
    <h3>Ссылка для клиента</h3>
    <button class="btn" id="generateBtn" type="button">Создать ссылку</button>
    <button class="btn alt" id="copyBtn" type="button">Скопировать</button>
    <div class="link-box" id="linkBox"><span id="linkUrl"></span></div>
    <div class="status" id="formStatus"></div>
  </div>

  <div class="card">
    <h3>Настройки GitHub</h3>
    <div class="settings-grid">
      <div><label for="ghToken">Token</label><input id="ghToken" type="password"></div>
      <div><label for="ghOwner">Owner</label><input id="ghOwner" type="text"></div>
      <div><label for="ghRepo">Repo</label><input id="ghRepo" type="text"></div>
      <div><label for="ghBranch">Branch</label><input id="ghBranch" type="text" value="main"></div>
      <div class="span-2"><label for="ghPath">Файл подписей</label><input id="ghPath" type="text" value="data/signed_contract.json"></div>
    </div>
    <button class="btn alt" id="saveGhBtn" type="button">Сохранить</button>
    <div class="status" id="settingsStatus"></div>
  </div>

  <div class="card">
    <h3>Реестр</h3>
    <p class="muted">Всего: <strong id="totalCount">0</strong></p>
    <button class="btn alt" id="syncBtn" type="button">Синхронизировать</button>
    <div class="status" id="listStatus"></div>
    <p id="emptyMsg" class="muted">Пока нет записей.</p>
    <table id="registryTable" style="display:none">
      <thead><tr><th>#</th><th>Документ</th><th>ФИО</th><th>Создан</th><th>Подписан</th><th>Статус</th><th></th></tr></thead>
      <tbody id="registryBody"></tbody>
    </table>
  </div>
</div>
<script src="../assets/templates.js"></script>
<script src="../assets/app.js"></script>
<script src="../assets/admin-page.js"></script>
</body>
</html>
