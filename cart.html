<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Кошик — Усе в морозильці</title>
  <meta name="theme-color" content="#080f1e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --deep: #080f1e;
      --acc: #00c8f0;
      --acc2: #00e4b0;
      --bdr: rgba(255,255,255,0.08);
      --txt: #e4f0fa;
      --txt2: #7aa8c4;
      --card: rgba(255,255,255,0.05);
      --r: 14px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--deep);
      color: var(--txt);
      min-height: 100vh;
      padding-bottom: 200px;
    }
    .top {
      position: sticky; top: 0; z-index: 10;
      background: rgba(8,15,30,.97);
      border-bottom: 1px solid var(--bdr);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .top h1 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      flex: 1;
    }
    .back {
      color: var(--acc);
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 18px 24px;
    }
    .sec-title {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--txt2);
      margin: 18px 0 10px;
    }
    .cart-empty, .cart-success {
      text-align: center;
      padding: 48px 16px;
      color: var(--txt2);
    }
    .cart-empty a, .cart-success a {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--acc);
      color: #07202a;
      text-decoration: none;
      font-weight: 600;
    }
    .cart-success h2 {
      font-family: 'Syne', sans-serif;
      color: var(--acc2);
      font-size: 22px;
      margin-bottom: 8px;
    }
    .cart-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      margin-bottom: 10px;
    }
    .cart-row-name {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }
    .cart-row-meta {
      font-size: 12px;
      color: var(--txt2);
      margin-top: 4px;
    }
    .qty-stepper {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border: 1px solid var(--bdr);
      padding: 2px;
    }
    .qty-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--acc);
      font-size: 20px;
      cursor: pointer;
      border-radius: 8px;
    }
    .qty-btn:hover { background: rgba(0,200,240,.12); }
    .qty-val {
      min-width: 28px;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
    }
    .cart-row-end {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .cart-line-sum {
      font-size: 14px;
      color: var(--acc2);
      font-weight: 600;
      white-space: nowrap;
    }
    .cart-remove {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--bdr);
      background: transparent;
      color: #ffc2bc;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }
    .checkout-card {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      padding: 16px;
      margin-top: 8px;
    }
    .checkout-card label {
      display: block;
      font-size: 12px;
      color: var(--txt2);
      margin-bottom: 6px;
      margin-top: 12px;
    }
    .checkout-card label:first-child { margin-top: 0; }
    .checkout-card input,
    .checkout-card textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--bdr);
      background: rgba(255,255,255,0.06);
      color: var(--txt);
      font-size: 15px;
      font-family: inherit;
    }
    .checkout-card textarea {
      min-height: 72px;
      resize: vertical;
    }
    .hp { position: absolute; left: -9999px; opacity: 0; height: 0; }
    .checkout-err {
      color: #ffc2bc;
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }
    .cart-foot {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
      background: rgba(8,15,30,.98);
      border-top: 1px solid var(--bdr);
      z-index: 20;
    }
    .cart-foot-in {
      max-width: 680px;
      margin: 0 auto;
    }
    .cart-total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .cart-total-row strong {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      color: var(--acc2);
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-order {
      background: linear-gradient(135deg, var(--acc), var(--acc2));
      color: #07202a;
    }
    .btn-order:disabled { opacity: .5; cursor: not-allowed; }
    .btn-clear {
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--bdr);
      color: var(--txt2);
      font-weight: 500;
      font-size: 14px;
      padding: 10px;
    }
    .cart-hint {
      font-size: 12px;
      color: var(--txt2);
      margin-top: 10px;
      text-align: center;
      line-height: 1.5;
    }
    .cart-err { color: #ffc2bc; padding: 20px; }
    @media (max-width: 520px) {
      .cart-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .cart-row-end {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .qty-stepper { justify-self: start; }
    }
  </style>
</head>
<body>
  <header class="top">
    <a class="back" href="index.html">← Меню</a>
    <h1>Кошик</h1>
  </header>

  <main>
    <div id="cartEmpty" class="cart-empty" hidden>
      <p>Кошик порожній</p>
      <a href="index.html">Обрати товари</a>
    </div>

    <div id="cartSuccess" class="cart-success" hidden>
      <h2>✅ Замовлення відправлено</h2>
      <p>Менеджер скоро зв'яжеться з вами.</p>
      <a href="index.html">Повернутись до меню</a>
    </div>

    <div id="cartContent">
      <p class="sec-title">Товари</p>
      <div id="cartList"></div>

      <div id="cartCheckout" hidden>
        <p class="sec-title">Оформлення</p>
        <div class="checkout-card">
          <form id="checkoutForm">
            <input class="hp" type="text" name="website" tabindex="-1" autocomplete="off">
            <label for="customerName">Ваше ім'я</label>
            <input id="customerName" type="text" required minlength="2" autocomplete="name" placeholder="Олександр">
            <label for="customerPhone">Телефон</label>
            <input id="customerPhone" type="tel" required autocomplete="tel" placeholder="+380 XX XXX XX XX">
            <label for="customerComment">Коментар (необов'язково)</label>
            <textarea id="customerComment" placeholder="Час доставки, побажання…"></textarea>
            <p id="checkoutError" class="checkout-err"></p>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div class="cart-foot" id="cartFoot" hidden>
    <div class="cart-foot-in">
      <div class="cart-total-row">
        <span>Загальна сума</span>
        <strong id="cartTotal">0.00 грн</strong>
      </div>
      <button type="submit" form="checkoutForm" class="btn btn-order" id="cartSubmitBtn">
        Оформити замовлення
      </button>
      <button type="button" class="btn btn-clear" id="cartClearBtn">Очистити кошик</button>
      <p class="cart-hint">Замовлення через Google → Telegram-група «Заказы».</p>
    </div>
  </div>

  <script src="assets/js/catalog.js?v=15"></script>
  <script src="assets/js/cart.js?v=15"></script>
  <script src="assets/js/cart-page.js?v=15"></script>
</body>
</html>
